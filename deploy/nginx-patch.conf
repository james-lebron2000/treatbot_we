
    # === Auto-added by GitHub Actions deploy: route landing/demo/api to treatbot-api container ===
    # Demo 静态图片（公开演示样例图）
    location /demo-assets/ {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # 通用 /api/* catch-all（必须放在白名单 /api/auth/* 之后；nginx location 匹配最长前缀，所以白名单仍生效）
    location /api/ {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 60s;
        proxy_send_timeout 300s;
        proxy_read_timeout 300s;
        client_max_body_size 30m;
    }

    location = /health { proxy_pass http://127.0.0.1:3000; proxy_set_header Host $host; }
    location = /ready  { proxy_pass http://127.0.0.1:3000; proxy_set_header Host $host; }
    location = /live   { proxy_pass http://127.0.0.1:3000; proxy_set_header Host $host; }

    # 落地页（根路径 → express.static landing）
    location = / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
    # === end auto-added ===
