version: '3.8'

services:
  # еә”з”ЁжңҚеҠЎ
  api:
    build: .
    container_name: treatbot-api
    restart: always
    ports:
      - "127.0.0.1:3000:3000"
    environment:
      - NODE_ENV=production
      - PORT=3000
      - DB_HOST=mysql
      - DB_PORT=3306
      - DB_USER=treatbot
      - DB_PASSWORD=${DB_PASSWORD:?иҜ·еңЁ .env дёӯи®ҫзҪ® DB_PASSWORD}
      - DB_NAME=treatbot
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_PASSWORD=${REDIS_PASSWORD:-}
      - JWT_SECRET=${JWT_SECRET:?иҜ·еңЁ .env дёӯи®ҫзҪ® JWT_SECRET}
      - WEAPP_APPID=${WEAPP_APPID}
      - WEAPP_SECRET=${WEAPP_SECRET}
      - WEAPP_SESSION_TTL=${WEAPP_SESSION_TTL:-7200}
      - H5_LOGIN_ENABLED=${H5_LOGIN_ENABLED:-false}
      - H5_LOGIN_FIXED_CODE=${H5_LOGIN_FIXED_CODE:-000000}
      - COS_SECRET_ID=${COS_SECRET_ID}
      - COS_SECRET_KEY=${COS_SECRET_KEY}
      - COS_BUCKET=${COS_BUCKET}
      - COS_REGION=${COS_REGION:-ap-shanghai}
      - OCR_SECRET_ID=${OCR_SECRET_ID}
      - OCR_SECRET_KEY=${OCR_SECRET_KEY}
      - OCR_REGION=${OCR_REGION:-ap-shanghai}
      - OCR_PROVIDER=${OCR_PROVIDER:-auto}
      - OCR_QUEUE_CONCURRENCY=${OCR_QUEUE_CONCURRENCY:-2}
      - OCR_PDF_VISION_MAX_PAGES=${OCR_PDF_VISION_MAX_PAGES:-3}
      - OCR_PDF_VISION_DPI=${OCR_PDF_VISION_DPI:-150}
      # MiniMaxпјҲеҺҶеҸІе…је®№пјӣдёҚеҶҚиҝӣе…Ҙз”ҹдә§ OCR auto и·Ҝеҫ„пјү
      - MINIMAX_API_KEY=${MINIMAX_API_KEY:-}
      - MINIMAX_BASE_URL=${MINIMAX_BASE_URL:-https://api.minimaxi.com/v1}
      - MINIMAX_MODEL=${MINIMAX_MODEL:-MiniMax-Text-01}
      # еӨҡжЁЎжҖҒпјҲimage OCRпјүйңҖиҰҒеҚ•зӢ¬зҡ„ vision жЁЎеһӢпјӣз•ҷз©әеҲҷйҷҚзә§еҲ° Kimi visionгҖӮ
      - MINIMAX_VISION_MODEL=${MINIMAX_VISION_MODEL:-}
      - MINIMAX_TIMEOUT_MS=${MINIMAX_TIMEOUT_MS:-45000}
      - MINIMAX_CHAT_PATH=${MINIMAX_CHAT_PATH:-/text/chatcompletion_v2}
      # KimiпјҲDoubao дёҚеҸҜз”Ёж—¶зҡ„ fallbackпјү
      - KIMI_API_KEY=${KIMI_API_KEY:-}
      - KIMI_BASE_URL=${KIMI_BASE_URL:-https://api.moonshot.cn/v1}
      - KIMI_MODEL=${KIMI_MODEL:-kimi-k2.5}
      - KIMI_VISION_MODEL=${KIMI_VISION_MODEL:-moonshot-v1-128k-vision-preview}
      - KIMI_TIMEOUT_MS=${KIMI_TIMEOUT_MS:-45000}
      # Doubao / зҒ«еұұж–№иҲҹ ArkпјҲз”ҹдә§ OCR жҺЁиҚҗдё»и·Ҝеҫ„пјү
      - ARK_API_KEY=${ARK_API_KEY:-}
      - ARK_BASE_URL=${ARK_BASE_URL:-https://ark.cn-beijing.volces.com/api/v3}
      - ARK_VISION_MODEL=${ARK_VISION_MODEL:-doubao-seed-1-6-vision-250815}
      - ARK_TIMEOUT_MS=${ARK_TIMEOUT_MS:-180000}
      - PUBLIC_BASE_URL=${PUBLIC_BASE_URL:-https://api.treatbot.example.com}
    volumes:
      - ./logs:/app/logs
      - ./uploads:/app/uploads
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - treatbot-network
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3000/health',(r)=>process.exit(r.statusCode===200?0:1)).on('error',()=>process.exit(1))"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # MySQL ж•°жҚ®еә“
  mysql:
    image: mysql:8.0
    container_name: treatbot-mysql
    restart: always
    environment:
      - MYSQL_ROOT_PASSWORD=${MYSQL_ROOT_PASSWORD:?иҜ·еңЁ .env дёӯи®ҫзҪ® MYSQL_ROOT_PASSWORD}
      - MYSQL_DATABASE=treatbot
      - MYSQL_USER=treatbot
      - MYSQL_PASSWORD=${DB_PASSWORD:?иҜ·еңЁ .env дёӯи®ҫзҪ® DB_PASSWORD}
    volumes:
      - mysql-data:/var/lib/mysql
      - ./scripts/init.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "3306:3306"
    networks:
      - treatbot-network
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -uroot -p$${MYSQL_ROOT_PASSWORD} --silent"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    command: --default-authentication-plugin=mysql_native_password --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci

  # Redis зј“еӯҳ
  redis:
    image: redis:7-alpine
    container_name: treatbot-redis
    restart: always
    command: >
      sh -c "if [ -n \"${REDIS_PASSWORD}\" ]; then
        redis-server --appendonly yes --requirepass \"${REDIS_PASSWORD}\";
      else
        redis-server --appendonly yes;
      fi"
    volumes:
      - redis-data:/data
    ports:
      - "6379:6379"
    networks:
      - treatbot-network
    healthcheck:
      test: ["CMD-SHELL", "if [ -n \"$${REDIS_PASSWORD}\" ]; then redis-cli -a \"$${REDIS_PASSWORD}\" ping; else redis-cli ping; fi"]
      interval: 10s
      timeout: 3s
      retries: 5

  # Nginx еҸҚеҗ‘д»ЈзҗҶ
  nginx:
    image: nginx:alpine
    container_name: treatbot-nginx
    profiles:
      - proxy
    restart: always
    ports:
      - "8080:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf
      - ./nginx/conf.d:/etc/nginx/conf.d
    depends_on:
      - api
    networks:
      - treatbot-network

volumes:
  mysql-data:
  redis-data:

networks:
  treatbot-network:
    driver: bridge
