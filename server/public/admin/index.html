<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>数愈健康 · 管理后台</title>
  <link rel="stylesheet" href="./tokens.css">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: var(--font-sans);
      background: var(--bg-soft);
      color: var(--text);
      font-size: var(--fs-body);
      line-height: var(--lh-relaxed);
    }

    .app-header {
      background: var(--bg);
      border-bottom: 1px solid var(--line);
      padding: var(--s-4) var(--s-6);
      position: sticky;
      top: 0;
      z-index: 20;
    }

    .app-header-inner {
      max-width: 1120px;
      margin: 0 auto;
      display: flex;
      align-items: center;
      gap: var(--s-3);
    }

    .brand-mark {
      width: 36px;
      height: 36px;
      border-radius: var(--r-md);
      background: var(--brand);
      color: #fff;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    .brand-mark svg { width: 20px; height: 20px; stroke: currentColor; fill: none; stroke-width: 1.75; stroke-linecap: round; stroke-linejoin: round; }

    .brand-text {
      display: flex;
      flex-direction: column;
      line-height: var(--lh-tight);
    }

    .brand-eyebrow {
      font-size: var(--fs-caption);
      letter-spacing: 1px;
      text-transform: uppercase;
      color: var(--text-muted);
    }

    .brand-name {
      font-size: var(--fs-subtitle);
      font-weight: 600;
      color: var(--text);
    }

    .header-actions { margin-left: auto; display: flex; align-items: center; gap: var(--s-2); }

    .header-account {
      font-size: var(--fs-caption);
      color: var(--text-dim);
    }

    .container {
      max-width: 1120px;
      margin: 0 auto;
      padding: var(--s-6);
    }

    .stats-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: var(--s-4);
      margin-bottom: var(--s-6);
    }

    .stat-card {
      background: var(--bg);
      border: 1px solid var(--line);
      border-radius: var(--r-lg);
      padding: var(--s-6);
      box-shadow: var(--shadow-1);
      transition: box-shadow 200ms ease;
    }

    .stat-card:hover { box-shadow: var(--shadow-2); }

    .stat-card h3 {
      font-size: var(--fs-caption);
      color: var(--text-muted);
      margin-bottom: var(--s-2);
      text-transform: uppercase;
      letter-spacing: 1px;
      font-weight: 600;
    }

    .stat-value {
      font-size: var(--fs-display);
      font-weight: 700;
      color: var(--text);
      line-height: var(--lh-tight);
      margin-bottom: var(--s-1);
    }

    .stat-change {
      font-size: var(--fs-caption);
      color: var(--text-dim);
    }

    .stat-change strong { color: var(--mint); font-weight: 600; }

    .section {
      background: var(--bg);
      border: 1px solid var(--line);
      border-radius: var(--r-lg);
      padding: var(--s-6);
      margin-bottom: var(--s-4);
      box-shadow: var(--shadow-1);
    }

    .section-head {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      gap: var(--s-3);
      margin-bottom: var(--s-4);
    }

    .section-head h2 {
      font-size: var(--fs-subtitle);
      font-weight: 600;
      color: var(--text);
    }

    .section-head .hint {
      font-size: var(--fs-caption);
      color: var(--text-muted);
    }

    .table {
      width: 100%;
      border-collapse: collapse;
    }

    .table th, .table td {
      padding: var(--s-3) var(--s-2);
      text-align: left;
      border-bottom: 1px solid var(--line);
    }

    .table th {
      font-weight: 600;
      color: var(--text-dim);
      font-size: var(--fs-caption);
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .table td {
      font-size: var(--fs-callout);
      color: var(--text);
    }

    .table tr:last-child td { border-bottom: 0; }

    .status-badge {
      display: inline-block;
      padding: var(--s-1) var(--s-3);
      border-radius: var(--r-pill);
      font-size: var(--fs-caption);
      font-weight: 600;
      letter-spacing: 0.5px;
    }

    .status-badge.pending { background: var(--amber-soft); color: var(--amber-text); }
    .status-badge.contacted { background: var(--brand-soft); color: var(--brand-hover); }
    .status-badge.enrolled { background: var(--mint-soft); color: var(--mint-text); }
    .status-badge.rejected, .status-badge.cancelled { background: var(--red-soft); color: var(--red-text); }

    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: var(--s-2) var(--s-4);
      border-radius: var(--r-md);
      font-size: var(--fs-callout);
      font-family: inherit;
      font-weight: 500;
      cursor: pointer;
      border: 1px solid transparent;
      /* Week 4 §F.4：全站微交互 —— 按下 0.98× + 100ms cubic-bezier */
      transition: background 150ms ease, border-color 150ms ease, color 150ms ease, transform 100ms cubic-bezier(0.4, 0, 0.2, 1);
      -webkit-tap-highlight-color: transparent;
    }
    .btn:active:not(:disabled) { transform: scale(0.98); }

    .btn-primary { background: var(--brand); color: #fff; }
    .btn-primary:hover { background: var(--brand-hover); }
    .btn-primary:focus-visible { outline: none; box-shadow: var(--shadow-focus); }

    .btn-ghost { background: transparent; color: var(--text-dim); border-color: var(--line); }
    .btn-ghost:hover { background: var(--bg-soft); color: var(--text); }
    .btn-ghost:focus-visible { outline: none; box-shadow: var(--shadow-focus); }

    .loading {
      text-align: center;
      padding: var(--s-12) var(--s-6);
      color: var(--text-muted);
      font-size: var(--fs-callout);
    }

    .empty-state {
      text-align: center;
      padding: var(--s-12) var(--s-6);
      color: var(--text-dim);
      font-size: var(--fs-callout);
    }

    .empty-state-title {
      display: block;
      font-size: var(--fs-subtitle);
      color: var(--text);
      font-weight: 600;
      margin-bottom: var(--s-2);
    }

    @media (max-width: 640px) {
      .container { padding: var(--s-4); }
      .stats-grid { grid-template-columns: 1fr 1fr; gap: var(--s-3); }
      .stat-card { padding: var(--s-4); }
      .stat-value { font-size: var(--fs-title); }
      .table th, .table td { padding: var(--s-2); }
    }
  </style>
</head>
<body>
  <header class="app-header">
    <div class="app-header-inner">
      <span class="brand-mark" aria-hidden="true">
        <svg viewBox="0 0 24 24"><path d="M3 12l2-2 4 4 8-8 4 4"/></svg>
      </span>
      <div class="brand-text">
        <span class="brand-eyebrow">Admin Console</span>
        <span class="brand-name">数愈健康 · 管理后台</span>
      </div>
      <div class="header-actions">
        <span class="header-account" id="adminAccount">未登录</span>
      </div>
    </div>
  </header>

  <main class="container">
    <section class="stats-grid" id="stats">
      <div class="stat-card">
        <h3>总用户数</h3>
        <div class="stat-value" id="totalUsers">—</div>
        <div class="stat-change">今日新增 <strong id="todayUsers">—</strong></div>
      </div>
      <div class="stat-card">
        <h3>总病历数</h3>
        <div class="stat-value" id="totalRecords">—</div>
        <div class="stat-change">今日新增 <strong id="todayRecords">—</strong></div>
      </div>
      <div class="stat-card">
        <h3>总报名数</h3>
        <div class="stat-value" id="totalApplications">—</div>
        <div class="stat-change">今日新增 <strong id="todayApplications">—</strong></div>
      </div>
    </section>

    <section class="section">
      <div class="section-head">
        <h2>最近报名</h2>
        <span class="hint">取最近 10 条；点「标记已联系」会写入操作日志</span>
      </div>
      <div class="loading" id="applicationsLoading">加载中…</div>
      <table class="table" id="applicationsTable" style="display: none;">
        <thead>
          <tr>
            <th>用户</th>
            <th>试验 ID</th>
            <th>状态</th>
            <th>报名时间</th>
            <th>操作</th>
          </tr>
        </thead>
        <tbody id="applicationsBody"></tbody>
      </table>
      <div class="empty-state" id="applicationsEmpty" style="display: none;">
        <span class="empty-state-title">暂无报名</span>
        <span>当用户在小程序提交报名后会出现在这里。</span>
      </div>
    </section>
  </main>

  <script src="./dialog.js"></script>
  <script>
    var API_BASE = window.location.origin + '/api';

    function getToken() {
      return localStorage.getItem('admin_token') || '';
    }

    function clearToken() {
      localStorage.removeItem('admin_token');
    }

    function setAccount(name) {
      var node = document.getElementById('adminAccount');
      if (node) node.textContent = name || '未登录';
    }

    function showAuthBanner(message) {
      AdminUI.banner(message || '登录已失效，请重新登录后再操作。', {
        tone: 'warning',
        action: {
          text: '重新登录',
          onClick: function () {
            clearToken();
            window.location.href = '/admin/login';
          }
        }
      });
    }

    function handleAuthFailure(response) {
      if (response.status === 401 || response.status === 403) {
        showAuthBanner('管理员 token 失效或权限不足。');
        return true;
      }
      return false;
    }

    async function loadDashboard() {
      try {
        var response = await fetch(API_BASE + '/admin/dashboard', {
          headers: { 'Authorization': 'Bearer ' + getToken() }
        });

        if (!response.ok) {
          if (handleAuthFailure(response)) return;
          throw new Error('获取数据失败 (HTTP ' + response.status + ')');
        }

        var data = await response.json();
        if (data.code !== 0) throw new Error(data.message || '后端返回错误');

        var stats = data.data.overview;
        document.getElementById('totalUsers').textContent = stats.totalUsers;
        document.getElementById('todayUsers').textContent = stats.todayUsers;
        document.getElementById('totalRecords').textContent = stats.totalRecords;
        document.getElementById('todayRecords').textContent = stats.todayRecords;
        document.getElementById('totalApplications').textContent = stats.totalApplications;
        document.getElementById('todayApplications').textContent = stats.todayApplications;

        if (data.data && data.data.admin && data.data.admin.username) {
          setAccount(data.data.admin.username);
        }
      } catch (error) {
        AdminUI.toast('加载统计数据失败：' + error.message, { tone: 'danger' });
      }
    }

    async function loadApplications() {
      try {
        var response = await fetch(API_BASE + '/admin/applications?pageSize=10', {
          headers: { 'Authorization': 'Bearer ' + getToken() }
        });

        if (!response.ok) {
          if (handleAuthFailure(response)) return;
          throw new Error('获取报名列表失败 (HTTP ' + response.status + ')');
        }

        var data = await response.json();
        if (data.code !== 0) throw new Error(data.message || '后端返回错误');

        var tbody = document.getElementById('applicationsBody');
        var loadingEl = document.getElementById('applicationsLoading');
        var tableEl = document.getElementById('applicationsTable');
        var emptyEl = document.getElementById('applicationsEmpty');
        tbody.innerHTML = '';

        if (!data.data.list.length) {
          loadingEl.style.display = 'none';
          tableEl.style.display = 'none';
          emptyEl.style.display = 'block';
          return;
        }

        data.data.list.forEach(function (app) {
          var row = document.createElement('tr');
          var statusText = getStatusText(app.status);
          row.innerHTML =
            '<td>' + escapeHtml(app.userName) + '</td>' +
            '<td>' + escapeHtml(app.trialId) + '</td>' +
            '<td><span class="status-badge ' + escapeHtml(app.status) + '">' + statusText + '</span></td>' +
            '<td>' + new Date(app.createdAt).toLocaleString() + '</td>' +
            '<td><button class="btn btn-ghost" data-id="' + escapeHtml(app.id) + '" data-name="' + escapeHtml(app.userName) + '">标记已联系</button></td>';
          tbody.appendChild(row);
        });

        tbody.querySelectorAll('button[data-id]').forEach(function (btn) {
          btn.addEventListener('click', function () {
            confirmAndMarkContacted(btn.getAttribute('data-id'), btn.getAttribute('data-name'));
          });
        });

        loadingEl.style.display = 'none';
        emptyEl.style.display = 'none';
        tableEl.style.display = 'table';
      } catch (error) {
        document.getElementById('applicationsLoading').textContent = '加载失败：' + error.message;
      }
    }

    function escapeHtml(value) {
      if (value == null) return '';
      return String(value).replace(/[&<>"']/g, function (ch) {
        return { '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[ch];
      });
    }

    function getStatusText(status) {
      var map = {
        'pending': '待联系',
        'contacted': '已联系',
        'enrolled': '已入组',
        'rejected': '不符合',
        'cancelled': '已取消'
      };
      return map[status] || status;
    }

    async function confirmAndMarkContacted(id, name) {
      var ok = await AdminUI.confirm({
        title: '标记「已联系」？',
        content: '将把 ' + (name || '该用户') + ' 的报名标为「已联系」。\n此操作会记录到操作日志，无法直接撤销。',
        confirmText: '标记已联系',
        cancelText: '再想想'
      });
      if (!ok) return;
      await updateStatus(id, 'contacted');
    }

    async function updateStatus(id, status) {
      try {
        var response = await fetch(API_BASE + '/admin/applications/' + id + '/status', {
          method: 'PUT',
          headers: {
            'Content-Type': 'application/json',
            'Authorization': 'Bearer ' + getToken()
          },
          body: JSON.stringify({ status: status })
        });

        if (!response.ok) {
          if (handleAuthFailure(response)) return;
          throw new Error('更新失败 (HTTP ' + response.status + ')');
        }

        AdminUI.toast('状态已更新，已记录到操作日志', { tone: 'success' });
        loadApplications();
      } catch (error) {
        AdminUI.toast('更新失败：' + error.message, { tone: 'danger' });
      }
    }

    document.addEventListener('DOMContentLoaded', function () {
      if (!getToken()) {
        showAuthBanner('请先登录管理后台。');
        return;
      }
      loadDashboard();
      loadApplications();
    });
  </script>
</body>
</html>
