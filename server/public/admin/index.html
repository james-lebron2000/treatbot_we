<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Treatbot 管理后台</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #f0f2f5;
      color: #333;
    }
    
    .header {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      padding: 20px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
    }
    
    .header h1 {
      font-size: 24px;
      font-weight: 600;
    }
    
    .container {
      max-width: 1200px;
      margin: 0 auto;
      padding: 20px;
    }
    
    .stats-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
      gap: 20px;
      margin-bottom: 30px;
    }
    
    .stat-card {
      background: white;
      border-radius: 12px;
      padding: 24px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.08);
    }
    
    .stat-card h3 {
      font-size: 14px;
      color: #666;
      margin-bottom: 12px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    
    .stat-value {
      font-size: 36px;
      font-weight: 700;
      color: #333;
      margin-bottom: 8px;
    }
    
    .stat-change {
      font-size: 14px;
      color: #52c41a;
    }
    
    .stat-change.negative {
      color: #ff4d4f;
    }
    
    .section {
      background: white;
      border-radius: 12px;
      padding: 24px;
      margin-bottom: 20px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.08);
    }
    
    .section h2 {
      font-size: 18px;
      margin-bottom: 20px;
      color: #333;
    }
    
    .table {
      width: 100%;
      border-collapse: collapse;
    }
    
    .table th,
    .table td {
      padding: 12px;
      text-align: left;
      border-bottom: 1px solid #f0f0f0;
    }
    
    .table th {
      font-weight: 600;
      color: #666;
      font-size: 14px;
    }
    
    .table td {
      font-size: 14px;
    }
    
    .status-badge {
      display: inline-block;
      padding: 4px 12px;
      border-radius: 12px;
      font-size: 12px;
      font-weight: 500;
    }
    
    .status-badge.pending {
      background: #fff7e6;
      color: #fa8c16;
    }
    
    .status-badge.contacted {
      background: #e6f7ff;
      color: #1890ff;
    }
    
    .status-badge.enrolled {
      background: #f6ffed;
      color: #52c41a;
    }
    
    .status-badge.rejected {
      background: #fff1f0;
      color: #ff4d4f;
    }
    
    .btn {
      display: inline-block;
      padding: 8px 16px;
      border-radius: 6px;
      font-size: 14px;
      cursor: pointer;
      border: none;
      transition: all 0.3s;
    }
    
    .btn-primary {
      background: #1890ff;
      color: white;
    }
    
    .btn-primary:hover {
      background: #40a9ff;
    }
    
    .loading {
      text-align: center;
      padding: 40px;
      color: #999;
    }
    
    .error {
      background: #fff1f0;
      color: #ff4d4f;
      padding: 12px;
      border-radius: 6px;
      margin-bottom: 20px;
    }
  </style>
</head>
<body>
  <div class="header">
    <h1>🏥 Treatbot 管理后台</h1>
  </div>
  
  <div class="container">
    <div id="error" class="error" style="display: none;"></div>
    
    <!-- 统计卡片 -->
    <div class="stats-grid" id="stats">
      <div class="stat-card">
        <h3>总用户数</h3>
        <div class="stat-value" id="totalUsers">-</div>
        <div class="stat-change">今日 +<span id="todayUsers">-</span></div>
      </div>
      <div class="stat-card">
        <h3>总病历数</h3>
        <div class="stat-value" id="totalRecords">-</div>
        <div class="stat-change">今日 +<span id="todayRecords">-</span></div>
      </div>
      <div class="stat-card">
        <h3>总报名数</h3>
        <div class="stat-value" id="totalApplications">-</div>
        <div class="stat-change">今日 +<span id="todayApplications">-</span></div>
      </div>
    </div>
    
    <!-- 报名列表 -->
    <div class="section">
      <h2>最近报名</h2>
      <div class="loading" id="applicationsLoading">加载中...</div>
      <table class="table" id="applicationsTable" style="display: none;">
        <thead>
          <tr>
            <th>用户</th>
            <th>试验ID</th>
            <th>状态</th>
            <th>报名时间</th>
            <th>操作</th>
          </tr>
        </thead>
        <tbody id="applicationsBody">
        </tbody>
      </table>
    </div>
  </div>

  <script>
    // API 基础地址
    const API_BASE = window.location.origin + '/api';
    
    // 获取 Token（从 localStorage 或从 URL 参数）
    function getToken() {
      return localStorage.getItem('admin_token') || '';
    }
    
    // 显示错误
    function showError(message) {
      const errorDiv = document.getElementById('error');
      errorDiv.textContent = message;
      errorDiv.style.display = 'block';
    }
    
    // 加载仪表盘数据
    async function loadDashboard() {
      try {
        const response = await fetch(`${API_BASE}/admin/dashboard`, {
          headers: {
            'Authorization': `Bearer ${getToken()}`
          }
        });
        
        if (!response.ok) {
          throw new Error('获取数据失败');
        }
        
        const data = await response.json();
        
        if (data.code !== 0) {
          throw new Error(data.message);
        }
        
        const stats = data.data.overview;
        document.getElementById('totalUsers').textContent = stats.totalUsers;
        document.getElementById('todayUsers').textContent = stats.todayUsers;
        document.getElementById('totalRecords').textContent = stats.totalRecords;
        document.getElementById('todayRecords').textContent = stats.todayRecords;
        document.getElementById('totalApplications').textContent = stats.totalApplications;
        document.getElementById('todayApplications').textContent = stats.todayApplications;
        
      } catch (error) {
        showError('加载统计数据失败: ' + error.message);
      }
    }
    
    // 加载报名列表
    async function loadApplications() {
      try {
        const response = await fetch(`${API_BASE}/admin/applications?pageSize=10`, {
          headers: {
            'Authorization': `Bearer ${getToken()}`
          }
        });
        
        if (!response.ok) {
          throw new Error('获取报名列表失败');
        }
        
        const data = await response.json();
        
        if (data.code !== 0) {
          throw new Error(data.message);
        }
        
        const tbody = document.getElementById('applicationsBody');
        tbody.innerHTML = '';
        
        data.data.list.forEach(app => {
          const row = document.createElement('tr');
          row.innerHTML = `
            <td>${app.userName}</td>
            <td>${app.trialId}</td>
            <td><span class="status-badge ${app.status}">${getStatusText(app.status)}</span></td>
            <td>${new Date(app.createdAt).toLocaleString()}</td>
            <td>
              <button class="btn btn-primary" onclick="updateStatus('${app.id}', 'contacted')">标记已联系</button>
            </td>
          `;
          tbody.appendChild(row);
        });
        
        document.getElementById('applicationsLoading').style.display = 'none';
        document.getElementById('applicationsTable').style.display = 'table';
        
      } catch (error) {
        document.getElementById('applicationsLoading').textContent = '加载失败: ' + error.message;
      }
    }
    
    // 获取状态文本
    function getStatusText(status) {
      const map = {
        'pending': '待联系',
        'contacted': '已联系',
        'enrolled': '已入组',
        'rejected': '不符合',
        'cancelled': '已取消'
      };
      return map[status] || status;
    }
    
    // 更新报名状态
    async function updateStatus(id, status) {
      try {
        const response = await fetch(`${API_BASE}/admin/applications/${id}/status`, {
          method: 'PUT',
          headers: {
            'Content-Type': 'application/json',
            'Authorization': `Bearer ${getToken()}`
          },
          body: JSON.stringify({ status })
        });
        
        if (!response.ok) {
          throw new Error('更新失败');
        }
        
        alert('状态更新成功');
        loadApplications();
        
      } catch (error) {
        alert('更新失败: ' + error.message);
      }
    }
    
    // 初始化
    document.addEventListener('DOMContentLoaded', () => {
      // 检查是否已登录
      if (!getToken()) {
        showError('请先登录');
        return;
      }
      
      loadDashboard();
      loadApplications();
    });
  </script>
</body>
</html>
