/var/log/treatbot/*.log {
    daily
    rotate 30
    compress
    delaycompress
    missingok
    notifempty
    create 0644 www-data www-data
    sharedscripts
    postrotate
        # 通知应用重新打开日志文件
        pm2 reloadLogs > /dev/null 2>&1 || true
    endscript
}

/var/log/treatbot/error*.log {
    daily
    rotate 90
    compress
    delaycompress
    missingok
    notifempty
    create 0644 www-data www-data
}
