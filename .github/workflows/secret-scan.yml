name: Secret Scan

on:
  pull_request:
    branches: [ main, master ]
  push:
    branches: [ main, master ]

# 对应 PRD-2026Q2 §2.1：CI 入闸，任何带着真实 key 的提交会红屏阻断。
jobs:
  trufflehog:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout (full history)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run TruffleHog
        uses: trufflesecurity/trufflehog@v3.63.2
        with:
          # PR：只扫 base..head 增量；push to main：扫本次推送的 commits
          base: ${{ github.event.pull_request.base.sha || github.event.before }}
          head: ${{ github.event.pull_request.head.sha || github.sha }}
          # NOTE: trufflehog action 自身已注入 --fail；这里只追加额外开关，
          # 不要再写 --fail，否则 CLI 会因「flag 'fail' cannot be repeated」直接挂。
          extra_args: --only-verified
