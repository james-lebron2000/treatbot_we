name: Deploy to Production

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  test:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Setup Node.js
      uses: actions/setup-node@v3
      with:
        node-version: '18'
        cache: 'npm'
        cache-dependency-path: server/package-lock.json
    
    - name: Install dependencies
      working-directory: ./server
      run: npm ci
    
    - name: Run linter
      working-directory: ./server
      run: npm run lint

    - name: Run tests
      working-directory: ./server
      run: npm test -- --runInBand --forceExit
      env:
        NODE_ENV: test
        # 测试专用 JWT 秘钥，避免 jwtSecret.js 在 CI 打出 warning；足够长、非弱值
        JWT_SECRET: ci-test-only-jwt-secret-not-used-in-production-0123456789

    # 安全冒烟：确保 utils/jwtSecret.js 的生产校验防线没被回退。
    # 3 个断言全部必须失败才算通过：
    #   1) 生产环境未设置 JWT_SECRET → 应抛错
    #   2) 生产环境使用弱值 'your-secret-key' → 应抛错
    #   3) 生产环境秘钥 < 32 字符 → 应抛错
    - name: Security smoke — JWT_SECRET guard
      working-directory: ./server
      run: |
        set -e
        echo "▶ 1/3 production + missing JWT_SECRET should throw"
        ! NODE_ENV=production node -e "require('./utils/jwtSecret')" 2>/dev/null
        echo "▶ 2/3 production + weak value should throw"
        ! NODE_ENV=production JWT_SECRET=your-secret-key node -e "require('./utils/jwtSecret')" 2>/dev/null
        echo "▶ 3/3 production + short value should throw"
        ! NODE_ENV=production JWT_SECRET=abc123short node -e "require('./utils/jwtSecret')" 2>/dev/null
        echo "✅ JWT_SECRET guard intact"

  build:
    needs: test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v2
    
    - name: Login to Docker Hub
      uses: docker/login-action@v2
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}
    
    - name: Build and push Docker image
      uses: docker/build-push-action@v4
      with:
        context: ./server
        push: true
        tags: |
          ${{ secrets.DOCKER_USERNAME }}/treatbot-api:latest
          ${{ secrets.DOCKER_USERNAME }}/treatbot-api:${{ github.sha }}
        cache-from: type=gha
        cache-to: type=gha,mode=max

  deploy:
    needs: build
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Deploy to server
      uses: appleboy/ssh-action@v0.1.10
      with:
        host: ${{ secrets.SERVER_HOST }}
        username: ${{ secrets.SERVER_USER }}
        key: ${{ secrets.SERVER_SSH_KEY }}
        script: |
          set -e
          cd /opt/treatbot
          echo "===== docker-compose.yml ====="
          cat docker-compose.yml || true
          echo "===== docker-compose pull ====="
          docker-compose pull
          echo "===== docker-compose up -d ====="
          docker-compose up -d
          echo "===== docker ps ====="
          docker ps --format 'table {{.Names}}\t{{.Image}}\t{{.Status}}\t{{.Ports}}'
          echo "===== treatbot images ====="
          docker images | grep -i treatbot || echo "(no treatbot images)"
          echo "===== api container HEAD commit (from /app) ====="
          API_CT=$(docker ps --format '{{.Names}}' | grep -i api | head -1 || true)
          if [ -n "$API_CT" ]; then
            docker exec "$API_CT" sh -c 'ls -la /app/public/landing 2>/dev/null && echo "--- demo.js ---" && ls -la /app/controllers/demo.js 2>/dev/null && ls -la /app/fixtures 2>/dev/null' || echo "(failed to inspect $API_CT)"
          else
            echo "(no api container running)"
          fi
          echo "===== nginx config (if any) ====="
          ls /etc/nginx/conf.d/ 2>/dev/null || true
          docker system prune -f
